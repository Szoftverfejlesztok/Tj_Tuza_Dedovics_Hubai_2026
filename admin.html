<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin felület - QuickHire</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-section { margin-bottom: 2rem; }
        .admin-section h2 { margin-bottom: 0.75rem; font-size: 1.15rem; }
        .admin-table-wrap { overflow-x: auto; border: 1px solid var(--border, #e2e8f0); border-radius: 8px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th, .admin-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border, #e2e8f0); vertical-align: top; }
        .admin-table th { background: #f8fafc; font-weight: 600; white-space: nowrap; }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table .cell-muted { color: #64748b; max-width: 12rem; overflow: hidden; text-overflow: ellipsis; }
        .admin-loading { color: #64748b; padding: 1rem 0; }
        .admin-error { color: #b91c1c; padding: 0.5rem 0; }
    </style>
</head>
<body>

<nav id="navbar" class="navbar"></nav>

<div class="page-content">
    <div class="container">
        <h1 class="mb-3">Admin felület</h1>
        <p class="subtitle mb-3" style="color:#64748b;">Áttekintés: regisztrált felhasználók, állások és jelentkezések (csak olvasható).</p>

        <!-- Munkavállalók -->
        <section class="card admin-section">
            <h2 class="card-title">Munkavállalók</h2>
            <div id="emp-status" class="admin-loading">Betöltés…</div>
            <div id="emp-table-wrap" class="admin-table-wrap hidden"></div>
        </section>

        <!-- Munkáltatók -->
        <section class="card admin-section">
            <h2 class="card-title">Munkáltatók</h2>
            <div id="er-status" class="admin-loading">Betöltés…</div>
            <div id="er-table-wrap" class="admin-table-wrap hidden"></div>
        </section>

        <!-- Állások -->
        <section class="card admin-section">
            <h2 class="card-title">Állások</h2>
            <div id="job-status" class="admin-loading">Betöltés…</div>
            <div id="job-table-wrap" class="admin-table-wrap hidden"></div>
        </section>

        <!-- Jelentkezések -->
        <section class="card admin-section">
            <h2 class="card-title">Jelentkezések</h2>
            <div id="app-status" class="admin-loading">Betöltés…</div>
            <div id="app-table-wrap" class="admin-table-wrap hidden"></div>
        </section>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    function el(id) { return document.getElementById(id); }

    function truncate(str, max) {
        if (!str) return '–';
        str = String(str);
        if (str.length <= max) return str;
        return str.slice(0, max) + '…';
    }

    function renderEmployees(rows) {
        var h = '<table class="admin-table"><thead><tr>' +
            '<th>ID</th><th>Név</th><th>E-mail</th><th>Életkor</th><th>Végzettség</th><th>Munkatapasztalat</th>' +
            '</tr></thead><tbody>';
        if (!rows.length) {
            h += '<tr><td colspan="6">Nincs megjeleníthető munkavállaló.</td></tr>';
        } else {
            rows.forEach(function(r) {
                h += '<tr><td>' + escapeHtml(String(r.id)) + '</td>' +
                    '<td>' + escapeHtml(r.nev) + '</td>' +
                    '<td>' + escapeHtml(r.email) + '</td>' +
                    '<td>' + escapeHtml(String(r.eletkor != null ? r.eletkor : '–')) + '</td>' +
                    '<td class="cell-muted" title="' + escapeHtml(r.vegzettseg || '') + '">' + escapeHtml(truncate(r.vegzettseg, 40)) + '</td>' +
                    '<td class="cell-muted" title="' + escapeHtml(r.munkatapasztalat || '') + '">' + escapeHtml(truncate(r.munkatapasztalat, 50)) + '</td></tr>';
            });
        }
        h += '</tbody></table>';
        el('emp-table-wrap').innerHTML = h;
        el('emp-table-wrap').classList.remove('hidden');
    }

    function renderEmployers(rows) {
        var h = '<table class="admin-table"><thead><tr>' +
            '<th>ID</th><th>Cégnév</th><th>E-mail</th><th>Székhely</th><th>Cégjegyzékszám</th><th>Tevékenységi kör</th><th>Adószám</th>' +
            '</tr></thead><tbody>';
        if (!rows.length) {
            h += '<tr><td colspan="7">Nincs megjeleníthető munkáltató.</td></tr>';
        } else {
            rows.forEach(function(r) {
                h += '<tr><td>' + escapeHtml(String(r.id)) + '</td>' +
                    '<td>' + escapeHtml(r.cegnev) + '</td>' +
                    '<td>' + escapeHtml(r.email) + '</td>' +
                    '<td>' + escapeHtml(r.szekhely || '–') + '</td>' +
                    '<td>' + escapeHtml(r.cegjegyzekszam || '–') + '</td>' +
                    '<td class="cell-muted">' + escapeHtml(truncate(r.tevekenysegi_kor, 30)) + '</td>' +
                    '<td>' + escapeHtml(r.adoszam || '–') + '</td></tr>';
            });
        }
        h += '</tbody></table>';
        el('er-table-wrap').innerHTML = h;
        el('er-table-wrap').classList.remove('hidden');
    }

    function renderJobs(rows) {
        var h = '<table class="admin-table"><thead><tr>' +
            '<th>ID</th><th>Megnevezés</th><th>Leírás (rövid)</th><th>Fizetés</th><th>Helyszín</th><th>Munkáltató</th><th>Típus</th>' +
            '</tr></thead><tbody>';
        if (!rows.length) {
            h += '<tr><td colspan="7">Nincs megjeleníthető állás.</td></tr>';
        } else {
            rows.forEach(function(r) {
                h += '<tr><td>' + escapeHtml(String(r.id)) + '</td>' +
                    '<td>' + escapeHtml(r.megnevezes) + '</td>' +
                    '<td class="cell-muted" title="' + escapeHtml(r.leiras || '') + '">' + escapeHtml(truncate(r.leiras, 60)) + '</td>' +
                    '<td>' + escapeHtml(formatSalary(r.fizetes)) + '</td>' +
                    '<td>' + escapeHtml(r.helyszin || '–') + '</td>' +
                    '<td>' + escapeHtml(r.munkaltato_nev || '–') + '</td>' +
                    '<td>' + escapeHtml(r.munka_tipus || '–') + '</td></tr>';
            });
        }
        h += '</tbody></table>';
        el('job-table-wrap').innerHTML = h;
        el('job-table-wrap').classList.remove('hidden');
    }

    function renderApplications(rows) {
        var h = '<table class="admin-table"><thead><tr>' +
            '<th>ID</th><th>Állapot</th><th>Jelentkezés dátuma</th><th>Interjú időpont</th><th>Munkavállaló</th><th>Állás</th>' +
            '</tr></thead><tbody>';
        if (!rows.length) {
            h += '<tr><td colspan="6">Nincs megjeleníthető jelentkezés.</td></tr>';
        } else {
            rows.forEach(function(r) {
                h += '<tr><td>' + escapeHtml(String(r.id)) + '</td>' +
                    '<td>' + getStatusBadge(r.allapot) + '</td>' +
                    '<td>' + escapeHtml(formatDateTime(r.datum)) + '</td>' +
                    '<td>' + escapeHtml(r.interju_idopont ? formatDateTime(r.interju_idopont) : '–') + '</td>' +
                    '<td>' + escapeHtml(r.munkavallalo_nev || '') + '<br><span class="cell-muted">' + escapeHtml(r.munkavallalo_email || '') + '</span></td>' +
                    '<td>' + escapeHtml(r.munka_megnevezes || '–') + '</td></tr>';
            });
        }
        h += '</tbody></table>';
        el('app-table-wrap').innerHTML = h;
        el('app-table-wrap').classList.remove('hidden');
    }

    function showLoadError(statusId, msg) {
        el(statusId).innerHTML = '<p class="admin-error">' + escapeHtml(msg) + '</p>';
        el(statusId).classList.remove('admin-loading');
    }

    async function loadAdminData() {
        var endpoints = [
            { action: 'list_employees', status: 'emp-status', render: renderEmployees, wrap: 'emp-table-wrap' },
            { action: 'list_employers', status: 'er-status', render: renderEmployers, wrap: 'er-table-wrap' },
            { action: 'list_jobs', status: 'job-status', render: renderJobs, wrap: 'job-table-wrap' },
            { action: 'list_applications', status: 'app-status', render: renderApplications, wrap: 'app-table-wrap' }
        ];

        var results = await Promise.all(endpoints.map(function(e) {
            return apiGet('admin.php?action=' + e.action);
        }));

        results.forEach(function(data, i) {
            var e = endpoints[i];
            el(e.status).classList.add('hidden');
            if (data.success && Array.isArray(data.data)) {
                e.render(data.data);
            } else {
                el(e.wrap).classList.add('hidden');
                showLoadError(e.status, data.message || 'Az adatok betöltése sikertelen.');
            }
        });
    }

    (async function init() {
        var user = await checkSession();
        if (!user || user.role !== 'admin') {
            window.location.href = 'login.html';
            return;
        }
        await renderNavbar();
        await loadAdminData();
    })();
</script>

</body>
</html>

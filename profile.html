<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilom - QuickHire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-fixed-footer">

<nav id="navbar" class="navbar"></nav>

<div class="page-content">
    <div class="container">
        <h1 class="mb-3">Profilom</h1>

        <!-- Profil űrlap -->
        <div id="profileSection" class="card mb-3">
            <div class="empty-state"><p>Betöltés...</p></div>
        </div>

        <!-- Jelentkezések (csak munkavállaló) -->
        <div id="applicationsSection" class="hidden">
            <h2 class="mb-2">Jelentkezéseim</h2>
            <div id="applicationsList" class="card">
                <div class="empty-state"><p>Betöltés...</p></div>
            </div>
        </div>

        <!-- Fiók törlése -->
        <div class="card mt-3" style="border-color: var(--error);">
            <h3 class="text-danger mb-1">Fiók törlése</h3>
            <p class="text-muted mb-2">Ez a művelet nem visszavonható. A fiók és minden adat törlődik.</p>
            <button class="btn btn-danger" onclick="deleteProfile()">Fiók törlése</button>
        </div>
    </div>
</div>

<footer class="footer">
    &copy; 2026 QuickHire - Minden jog fenntartva.
</footer>

<script src="js/api.js"></script>
<script>
    async function loadProfile() {
        var user = await checkSession();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        await renderNavbar();

        var data = await apiGet('profile.php');
        if (!data.success) {
            showToast('Hiba a profil betöltésekor.', 'error');
            return;
        }

        var p = data.profile;

        if (p.role === 'employee') {
            document.getElementById('profileSection').innerHTML =
                '<form onsubmit="saveProfile(event)">' +
                    '<div class="form-group">' +
                        '<label>Név *</label>' +
                        '<input type="text" id="p-nev" value="' + escapeHtml(p.nev || '') + '" required>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>E-mail *</label>' +
                        '<input type="email" id="p-email" value="' + escapeHtml(p.email || '') + '" required>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Telefon</label>' +
                        '<input type="text" id="p-tel" value="' + escapeHtml(p.telefonszam || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Végzettség</label>' +
                        '<input type="text" id="p-vegz" value="' + escapeHtml(p.vegzettseg || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Munkatapasztalat</label>' +
                        '<input type="text" id="p-munk" value="' + escapeHtml(p.munkatapasztalat || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Készségek</label>' +
                        '<textarea id="p-keszs">' + escapeHtml(p.keszsegek || '') + '</textarea>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Rövid bemutatkozás</label>' +
                        '<textarea id="p-bio">' + escapeHtml(p.oneletrajz || '') + '</textarea>' +
                    '</div>' +
                    '<button type="submit" class="btn btn-primary">Mentés</button>' +
                '</form>';

            document.getElementById('applicationsSection').classList.remove('hidden');
            loadApplications();

        } else {
            document.getElementById('profileSection').innerHTML =
                '<form onsubmit="saveProfile(event)">' +
                    '<div class="form-group">' +
                        '<label>Cégnév *</label>' +
                        '<input type="text" id="p-cegnev" value="' + escapeHtml(p.cegnev || '') + '" required>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Székhely</label>' +
                        '<input type="text" id="p-szekhely" value="' + escapeHtml(p.szekhely || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>E-mail *</label>' +
                        '<input type="email" id="p-email" value="' + escapeHtml(p.email || '') + '" required>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Kapcsolattartó neve</label>' +
                        '<input type="text" id="p-kapcs" value="' + escapeHtml(p.kapcsolattarto_nev || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Telefon</label>' +
                        '<input type="text" id="p-tel" value="' + escapeHtml(p.telefonszam || '') + '">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Weboldal</label>' +
                        '<input type="text" id="p-web" value="' + escapeHtml(p.weboldal || '') + '">' +
                    '</div>' +
                    '<button type="submit" class="btn btn-primary">Mentés</button>' +
                '</form>';
        }
    }

    async function saveProfile(event) {
        event.preventDefault();

        var body;

        if (currentUser.role === 'employee') {
            body = {
                nev: document.getElementById('p-nev').value,
                email: document.getElementById('p-email').value,
                telefonszam: document.getElementById('p-tel').value,
                vegzettseg: document.getElementById('p-vegz').value,
                munkatapasztalat: document.getElementById('p-munk').value,
                keszsegek: document.getElementById('p-keszs').value,
                oneletrajz: document.getElementById('p-bio').value
            };
        } else {
            body = {
                cegnev: document.getElementById('p-cegnev').value,
                szekhely: document.getElementById('p-szekhely').value,
                email: document.getElementById('p-email').value,
                kapcsolattarto_nev: document.getElementById('p-kapcs').value,
                telefonszam: document.getElementById('p-tel').value,
                weboldal: document.getElementById('p-web').value
            };
        }

        var data = await apiPost('profile.php', body);
        showToast(data.message, data.success ? 'success' : 'error');
    }

    async function loadApplications() {
        var data = await apiGet('apply.php');
        var container = document.getElementById('applicationsList');

        if (!data.success || data.applications.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>Még nem jelentkeztél sehova.</p></div>';
            return;
        }

        var html = '';
        data.applications.forEach(function(app) {
            html +=
                '<div class="list-item">' +
                    '<div>' +
                        '<strong>' + escapeHtml(app.megnevezes) + '</strong>' +
                        '<div class="text-muted">' +
                            escapeHtml(app.helyszin || '') + ' &middot; ' +
                            formatSalary(app.fizetes) +
                        '</div>' +
                        '<div class="text-muted">' + formatDate(app.datum) + '</div>' +
                    '</div>' +
                    '<div>' + getStatusBadge(app.allapot) + '</div>' +
                '</div>';
        });
        container.innerHTML = html;
    }

    async function deleteProfile() {
        if (!confirm('Biztosan törölni szeretnéd a fiókodat? Ez nem visszavonható!')) return;

        var data = await apiPost('profile.php', { action: 'delete' });
        if (data.success) {
            showToast(data.message, 'success');
            setTimeout(function() { window.location.href = 'index.html'; }, 1500);
        } else {
            showToast(data.message, 'error');
        }
    }

    loadProfile();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üzenetek - QuickHire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-fixed-footer">

<nav id="navbar" class="navbar"></nav>

<div class="page-content">
    <div class="container">
        <h1 class="mb-3">Üzenetek</h1>

        <div class="messages-layout">
            <!-- Beszélgetések listája (bal oldal) -->
            <div class="conversations-list" id="conversationsList">
                <div class="empty-state" style="padding:20px;"><p>Betöltés...</p></div>
            </div>

            <!-- Chat panel (jobb oldal) -->
            <div class="chat-panel">
                <div class="chat-header" id="chatHeader">
                    Válassz egy beszélgetést
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <p>Válassz egy beszélgetést a listából.</p>
                    </div>
                </div>
                <div class="chat-input" id="chatInput" style="display: none;">
                    <input type="text" id="messageInput" placeholder="Írd be az üzeneted..."
                           onkeydown="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-primary" onclick="sendMessage()">Küldés</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    &copy; 2026 QuickHire - Minden jog fenntartva.
</footer>

<script src="js/api.js"></script>
<script>
    var activePartnerId = null;
    var activePartnerRole = null;
    var partnerNames = {};

    async function init() {
        var user = await checkSession();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        await renderNavbar();
        await loadConversations();

        // URL paraméterek ellenőrzése (pl. employer.html-ről jövő link)
        var params = new URLSearchParams(window.location.search);
        var pid = params.get('partner_id');
        var prole = params.get('partner_role');
        if (pid && prole) {
            openChat(parseInt(pid), prole);
        }
    }

    async function loadConversations() {
        var data = await apiGet('messages.php');
        var container = document.getElementById('conversationsList');

        if (!data.success || data.conversations.length === 0) {
            container.innerHTML =
                '<div class="empty-state" style="padding:20px;">' +
                    '<p>Még nincs beszélgetésed.</p>' +
                '</div>';
            return;
        }

        var html = '';
        data.conversations.forEach(function(c) {
            // Partner nevek tárolása későbbi használatra
            partnerNames[c.partner_role + '_' + c.partner_id] = c.partner_name;

            var isActive = (activePartnerId == c.partner_id && activePartnerRole == c.partner_role);
            html +=
                '<div class="conversation-item' + (isActive ? ' active' : '') + '"' +
                     ' data-id="' + c.partner_id + '"' +
                     ' data-role="' + escapeHtml(c.partner_role) + '"' +
                     ' onclick="openChat(' + c.partner_id + ', \'' + escapeHtml(c.partner_role) + '\')">' +
                    '<div class="name">' +
                        escapeHtml(c.partner_name) +
                        (c.olvasatlan ? ' <span class="unread-dot"></span>' : '') +
                    '</div>' +
                    '<div class="preview">' + escapeHtml(c.utolso_uzenet) + '</div>' +
                    '<div class="date">' + formatDateTime(c.datum) + '</div>' +
                '</div>';
        });
        container.innerHTML = html;
    }

    async function openChat(partnerId, partnerRole) {
        activePartnerId = partnerId;
        activePartnerRole = partnerRole;

        // Partner név megkeresése
        var key = partnerRole + '_' + partnerId;
        var partnerName = partnerNames[key] ||
            (partnerRole === 'employee' ? 'Munkavállaló' : 'Munkáltató');

        document.getElementById('chatHeader').textContent = partnerName;
        document.getElementById('chatInput').style.display = 'flex';

        // Aktív elem kiemelése a listában
        var items = document.querySelectorAll('.conversation-item');
        items.forEach(function(item) {
            if (item.dataset.id == partnerId && item.dataset.role == partnerRole) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });

        // Üzenetek betöltése
        var data = await apiGet(
            'messages.php?partner_id=' + partnerId + '&partner_role=' + partnerRole
        );

        var messagesDiv = document.getElementById('chatMessages');

        if (!data.success || data.messages.length === 0) {
            messagesDiv.innerHTML =
                '<div class="empty-state"><p>Még nincs üzenet. Írj elsőként!</p></div>';
        } else {
            var html = '';
            data.messages.forEach(function(m) {
                html +=
                    '<div class="message-bubble ' + (m.sajat ? 'sent' : 'received') + '">' +
                        escapeHtml(m.uzenet) +
                        '<div class="time">' + formatDateTime(m.datum) + '</div>' +
                    '</div>';
            });
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Beszélgetés lista frissítése (olvasatlan jelölés eltűnik)
        loadConversations();

        document.getElementById('messageInput').focus();
    }

    async function sendMessage() {
        if (!activePartnerId || !activePartnerRole) {
            showToast('Válassz egy beszélgetést!', 'error');
            return;
        }

        var input = document.getElementById('messageInput');
        var text = input.value.trim();
        if (text === '') return;

        var data = await apiPost('messages.php', {
            cimzett_id: activePartnerId,
            cimzett_tipus: activePartnerRole,
            uzenet: text
        });

        if (data.success) {
            input.value = '';
            openChat(activePartnerId, activePartnerRole);
        } else {
            showToast(data.message, 'error');
        }
    }

    init();
</script>

</body>
</html>
